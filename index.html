<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Werewolf Slots 3P</title>
  <link rel="stylesheet" href="./css/style.css" />

  <script>
    window.addEventListener("error", (e) => {
      const s = document.getElementById("txtStatus");
      const a = document.getElementById("txtActing");
      if (s) s.textContent = "JSエラー";
      if (a) a.textContent = (e && e.message) ? e.message : String(e);
    });
    window.addEventListener("unhandledrejection", (e) => {
      const s = document.getElementById("txtStatus");
      const a = document.getElementById("txtActing");
      if (s) s.textContent = "Promiseエラー";
      if (a) a.textContent = (e && e.reason) ? String(e.reason) : "unhandledrejection";
    });
  </script>
</head>

<body>
  <div id="stage">
    <div id="app">
      <header id="topbar">
        <div class="toprow">
          <div class="title">人狼 3P</div>

          <div class="controls">
            <button id="btnCpuMode">ON</button>
            <button id="btnNew">New</button>

            <label class="inline">
              View as
              <select id="selViewAs">
                <option value="0">P1</option>
                <option value="1">P2</option>
                <option value="2">P3</option>
              </select>
            </label>

            <button id="btnAbsentOk" class="ghost">対象なし→OK</button>
          </div>
        </div>

        <div class="statusrow">
          <div id="txtStatus">boot...</div>
          <div id="txtActing">---</div>
        </div>
      </header>

      <main id="board">
        <div id="players" class="players"></div>
      </main>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
