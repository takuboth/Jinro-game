<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Werewolf Slots</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="stage">
    <div id="app">
      <header id="topbar">
        <div class="toprow">
          <div class="title">人狼スロット</div>
          <div class="controls">
            <button id="btnNew">New</button>

            <label class="inline">
              View as
              <select id="selViewAs">
                <option value="0">P1</option>
                <option value="1">P2</option>
                <option value="2">P3</option>
                <option value="3">P4</option>
              </select>
            </label>

            <button id="btnAbsentOk" class="ghost">不在→OK</button>
          </div>
        </div>

        <div class="statusrow">
          <div id="txtStatus">---</div>
          <div id="txtActing">---</div>
        </div>
      </header>

      <main id="board">
        <div id="players" class="players"></div>
      </main>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
